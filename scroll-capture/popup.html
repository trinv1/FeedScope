<!doctype html>
<html>
  <body style="font-family: system-ui; padding: 12px; width: 220px;">

    <label for="ownerId">Owner ID</label>
    <input id="ownerId" type="text" placeholder="Owner ID" />
    <select id="studyId" placeholder="Study ID" style="width:100%; padding:8px; margin-bottom:6px;"></select>
    <select id="subjectId" placeholder="Subject ID" style="width:100%; padding:8px; margin-bottom:6px;"></select>
    <select id="phaseId" placeholder="Phase ID" style="width:100%; padding:8px; margin-bottom:6px;"></select>
    <input id="sessionId" type="text" placeholder="Session ID" />

    <button id="start" style="width:100%; padding:10px;">Start</button>
    <button id="stop" style="width:100%; padding:10px; margin-top:6px;">Stop</button>

    <div id="status" style="margin-top:10px; font-size:12px; opacity:0.8;">Idle</div>

    <script src="popup.js"></script>
  </body>
</html>
