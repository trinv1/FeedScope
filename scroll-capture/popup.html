<!doctype html>
<html>
  <body style="font-family: system-ui; padding: 12px; width: 220px;">

    <input id="studyId" type="text" placeholder="Study ID" style="width:100%; padding:8px; margin-bottom:6px;" />
    <input id="subjectId" type="text" placeholder="Subject ID" style="width:100%; padding:8px; margin-bottom:6px;" />
    <input id="phaseId" type="text" placeholder="Phase ID" style="width:100%; padding:8px; margin-bottom:6px;" />
    <input id="sessionId" type="text" placeholder="Session ID" style="width:100%; padding:8px; margin-bottom:10px;" />

    <button id="start" style="width:100%; padding:10px;">Start</button>
    <button id="stop" style="width:100%; padding:10px; margin-top:6px;">Stop</button>

    <div id="status" style="margin-top:10px; font-size:12px; opacity:0.8;">Idle</div>

    <script src="popup.js"></script>
  </body>
</html>
